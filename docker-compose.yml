services:
  engine:
    build: ./engine/
    ports:
      - "20191:2019"
    volumes:
      - sqlite:/sqlite
    environment:
      - DBPATH=/sqlite/quotes.db
    develop:
      watch:
        - action: rebuild
          path: ./engine
          target: ./engine
  facade:
    build: ./facade/
    ports:
      - "20190:3000"
volumes:
  sqlite:
