services:
  engine:
    build: ./engine/
    ports:
      - "20191:2019"
    restart: always
    volumes:
      - data:/sqlite
    environment:
      - DBPATH=/sqlite/quotes.db
      - SECRET=${SECRET}
      - PORT=${PORT}
    develop:
      watch:
        - action: rebuild
          path: ./engine
          target: ./engine
  facade:
    build:
      context: ./facade/
    ports:
      - "20190:3000"
    restart: always
    environment:
      - NODE_ENV=production
volumes:
  data:
